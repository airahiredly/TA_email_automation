name: Sync Google Sheets Data

on:
  push:
    branches: [main]
  schedule:
    - cron: '0 7 * * *' # Runs every day at 7 AM UTC

jobs:
  run-sync:
    runs-on: ubuntu-latest

    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v3

      - name: 🐍 Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: 📦 Install dependencies
        run: pip install requests

      - name: 📦 Install dependencies
        run: pip install os

      - name: 🚀 Run sync script
        run: python main.py
        env:
          API_KEY: ${{ secrets.GSHEETS_API_KEY }}