# File: .github/workflows/manual_run.yml

name: Manual Candidate Processing

on:
  workflow_dispatch:
    inputs:
      # Define a single input for the combined JSON payload
      payload_json:
        description: 'Paste the combined JSON payload here'
        required: true
        type: string

jobs:
  process-candidates:
    runs-on: ubuntu-latest

    steps:
      - name: Check out code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests
      
      # This step now passes the single input to the environment
      - name: Run Candidate Processing Script
        env:
          # Map the single input and the secret to environment variables
          PAYLOAD_INPUT: ${{ inputs.payload_json }}
          API_KEY_SECRET: ${{ secrets.GOOGLE_API_KEY }}
        run: python run_workflow.py